<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 고정 네비게이션 바 -->
    <nav class="nav-bar">
        <div class="nav-container">
            <a href="#" class="logo">PORTFOLIO</a>
            <div class="menu">
                <a href="#webtoon">웹툰</a>
                <a href="#illustration">일러스트</a>
                <a href="#drawing">드로잉</a>
                <a href="#animation">애니메이션</a>
            </div>
        </div>
    </nav>

    <!-- 메인 콘텐츠 영역 -->
    <main class="main-content">
        
        <!-- 1. 웹툰 섹션 -->
        <section id="webtoon" class="portfolio-section">
            <h2 class="section-title">Webtoon</h2>
            <div class="grid">
                <div class="work-item">
                    <div class="thumbnail" style="background-color: #f0f0f0;"><!-- <img src="이미지경로.jpg" alt=""> --></div>
                    <p class="work-title">웹툰 프로젝트 제목 01</p>
                </div>
                <div class="work-item">
                    <div class="thumbnail" style="background-color: #eaeaea;"></div>
                    <p class="work-title">웹툰 프로젝트 제목 02</p>
                </div>
            </div>
        </section>

        <!-- 2. 일러스트 섹션 -->
        <section id="illustration" class="portfolio-section">
            <h2 class="section-title">Illustration</h2>
            <div class="grid">
                <div class="work-item">
                    <div class="thumbnail" style="background-color: #e5e5e5;"></div>
                    <p class="work-title">일러스트 작품 01</p>
                </div>
                <div class="work-item">
                    <div class="thumbnail" style="background-color: #f5f5f5;"></div>
                    <p class="work-title">일러스트 작품 02</p>
                </div>
            </div>
        </section>

        <!-- 3. 드로잉 섹션 -->
        <section id="drawing" class="portfolio-section">
            <h2 class="section-title">Drawing</h2>
            <div class="grid">
                <div class="work-item">
                    <div class="thumbnail" style="background-color: #f9f9f9;"></div>
                    <p class="work-title">드로잉/크로키 01</p>
                </div>
                <div class="work-item">
                    <div class="thumbnail" style="background-color: #eeeeee;"></div>
                    <p class="work-title">드로잉/크로키 02</p>
                </div>
            </div>
        </section>

        <!-- 4. 애니메이션 섹션 -->
        <section id="animation" class="portfolio-section">
            <h2 class="section-title">Animation</h2>
            <div class="grid">
                <div class="work-item">
                    <div class="thumbnail" style="background-color: #f2f2f2;"></div>
                    <p class="work-title">애니메이션/모션 영상 01</p>
                </div>
                <div class="work-item">
                    <div class="thumbnail" style="background-color: #e9e9e9;"></div>
                    <p class="work-title">애니메이션/모션 영상 02</p>
                </div>
            </div>
        </section>

    </main>

    <!-- 푸터 -->
    <footer class="footer">
        <p>© 2026. 본인 이름 All rights reserved.</p>
        <p>Contact: <a href="mailto:your-email@example.com">your-email@example.com</a></p>
    </footer>

</body>
</html>
